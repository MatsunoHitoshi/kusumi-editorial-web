name: Deploy Site

on:
  workflow_dispatch:
    inputs:
      triggeredBy:
        description: "Triggered user"
        required: true
        type: string
      publishVersion:
        description: "UTC timestamp version (yyyyMMddHHmmss)"
        required: true
        type: string
      contentTypes:
        description: "JSON array of content types"
        required: false
        default: '["pages","articles","projects","reading","publications"]'
        type: string
      fullRebuild:
        description: "Run full rebuild"
        required: false
        default: "true"
        type: string
      reason:
        description: "Optional publish reason"
        required: false
        default: ""
        type: string

concurrency:
  group: site-deploy-${{ github.event.inputs.publishVersion }}
  cancel-in-progress: false

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build static site
        env:
          PUBLISH_API_BASE_URL: ${{ secrets.PUBLISH_API_BASE_URL }}
          PUBLISH_API_TOKEN: ${{ secrets.PUBLISH_API_TOKEN }}
          PUBLISH_VERSION: ${{ github.event.inputs.publishVersion }}
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: npm --workspace @kusumi/site run build

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/site/out

      - name: Callback build result
        if: always()
        continue-on-error: true
        env:
          ADMIN_CALLBACK_URL: ${{ secrets.PUBLISH_API_BASE_URL }}
          DEPLOY_CALLBACK_TOKEN: ${{ secrets.DEPLOY_CALLBACK_TOKEN }}
          PUBLISH_VERSION: ${{ github.event.inputs.publishVersion }}
          CONCLUSION: ${{ job.status }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          callback_base_url="${ADMIN_CALLBACK_URL%/}"
          payload=$(cat <<EOF
          {"publishVersion":"${PUBLISH_VERSION}","stage":"build","conclusion":"${CONCLUSION}","runId":"${RUN_ID}","runAttempt":${RUN_ATTEMPT},"runUrl":"https://github.com/${OWNER}/${REPO}/actions/runs/${RUN_ID}"}
          EOF
          )
          callback_response=$(curl -sS -X POST "${callback_base_url}/api/workflows/deploy-callback" \
            -H "content-type: application/json" \
            -H "x-deploy-callback-token: ${DEPLOY_CALLBACK_TOKEN}" \
            --data-raw "${payload}" \
            -w "\nHTTP_STATUS:%{http_code}")
          callback_body=$(echo "${callback_response}" | sed '$d')
          callback_status=$(echo "${callback_response}" | sed -n 's/^HTTP_STATUS://p')
          echo "deploy-callback(build) status=${callback_status}"
          echo "deploy-callback(build) body=${callback_body}"
          if [ "${callback_status}" -ge 400 ]; then
            echo "::warning::deploy-callback(build) failed with status ${callback_status}"
          fi

  deploy_pages:
    needs: build_site
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Callback deploy result
        if: always()
        continue-on-error: true
        env:
          ADMIN_CALLBACK_URL: ${{ secrets.PUBLISH_API_BASE_URL }}
          DEPLOY_CALLBACK_TOKEN: ${{ secrets.DEPLOY_CALLBACK_TOKEN }}
          PUBLISH_VERSION: ${{ github.event.inputs.publishVersion }}
          CONCLUSION: ${{ job.status }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          callback_base_url="${ADMIN_CALLBACK_URL%/}"
          payload=$(cat <<EOF
          {"publishVersion":"${PUBLISH_VERSION}","stage":"deploy","conclusion":"${CONCLUSION}","runId":"${RUN_ID}","runAttempt":${RUN_ATTEMPT},"runUrl":"https://github.com/${OWNER}/${REPO}/actions/runs/${RUN_ID}"}
          EOF
          )
          callback_response=$(curl -sS -X POST "${callback_base_url}/api/workflows/deploy-callback" \
            -H "content-type: application/json" \
            -H "x-deploy-callback-token: ${DEPLOY_CALLBACK_TOKEN}" \
            --data-raw "${payload}" \
            -w "\nHTTP_STATUS:%{http_code}")
          callback_body=$(echo "${callback_response}" | sed '$d')
          callback_status=$(echo "${callback_response}" | sed -n 's/^HTTP_STATUS://p')
          echo "deploy-callback(deploy) status=${callback_status}"
          echo "deploy-callback(deploy) body=${callback_body}"
          if [ "${callback_status}" -ge 400 ]; then
            echo "::warning::deploy-callback(deploy) failed with status ${callback_status}"
          fi

